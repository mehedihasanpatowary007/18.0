<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="200" height="200" fill="#875A7B"/>

    <!-- Truck Icon -->
    <g transform="translate(40, 70)">
        <!-- Truck Body -->
        <rect x="0" y="20" width="70" height="40" fill="#FFFFFF" rx="5"/>
        <!-- Truck Cabin -->
        <rect x="70" y="10" width="40" height="50" fill="#FFFFFF" rx="5"/>

        <!-- Wheels -->
        <circle cx="20" cy="70" r="10" fill="#333333"/>
        <circle cx="20" cy="70" r="5" fill="#666666"/>
        <circle cx="90" cy="70" r="10" fill="#333333"/>
        <circle cx="90" cy="70" r="5" fill="#666666"/>

        <!-- Window -->
        <rect x="75" y="15" width="15" height="15" fill="#875A7B" rx="2"/>
        <rect x="95" y="15" width="10" height="15" fill="#875A7B" rx="2"/>

        <!-- Speed lines -->
        <line x1="-10" y1="30" x2="0" y2="30" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="-15" y1="40" x2="0" y2="40" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="-10" y1="50" x2="0" y2="50" stroke="#FFFFFF" stroke-width="2"/>
    </g>
</svg>
